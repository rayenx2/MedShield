<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgMS" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accMS" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1d4ed8"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glowMS" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="gridMS" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="rgMS" cx="80%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0a0f1a;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgMS)"/>
  <rect width="1200" height="400" fill="url(#gridMS)" opacity="0.4"/>
  <rect width="1200" height="400" fill="url(#rgMS)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accMS)" opacity="0.8"/>
  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="400" fill="url(#accMS)"/>

  <!-- Shield icon -->
  <g transform="translate(60, 140)" filter="url(#glowMS)">
    <rect width="100" height="110" rx="20" fill="url(#shieldGrad)" opacity="0.9"/>
    <!-- Shield path scaled -->
    <g transform="translate(18, 15) scale(2.67, 2.67)">
      <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.25C17.25 22.15 21 17.25 21 12V7L12 2z"
            fill="none" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M9 12l2 2 4-4" fill="none" stroke="#93c5fd" stroke-width="1.6"
            stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- MedShield title -->
  <text x="192" y="188" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="68" font-weight="700" fill="#f1f5f9" letter-spacing="-2">
    Med<tspan fill="url(#accMS)">Shield</tspan>
  </text>

  <!-- Subtitle -->
  <text x="194" y="228" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="17" font-weight="400" fill="#64748b" letter-spacing="0.2">
    HIPAA-aware medical records vault  ·  patient-controlled encryption  ·  AI summaries
  </text>

  <!-- Divider -->
  <line x1="192" y1="252" x2="900" y2="252" stroke="#1e293b" stroke-width="1"/>

  <!-- KPI badges -->
  <g transform="translate(192, 268)">
    <rect width="130" height="38" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="65" y="14" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">ENCRYPTION</text>
    <text x="65" y="30" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">AES-256-GCM</text>
  </g>
  <g transform="translate(334, 268)">
    <rect width="130" height="38" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="65" y="14" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">AUTH</text>
    <text x="65" y="30" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">JWT + HMAC</text>
  </g>
  <g transform="translate(476, 268)">
    <rect width="130" height="38" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="65" y="14" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">EMERGENCY</text>
    <text x="65" y="30" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">break-glass</text>
  </g>
  <g transform="translate(618, 268)">
    <rect width="130" height="38" rx="7" fill="#0f172a" stroke="#1e3a5f" stroke-width="1"/>
    <text x="65" y="14" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="9" fill="#475569" text-anchor="middle" letter-spacing="1" font-weight="600">COMPLIANCE</text>
    <text x="65" y="30" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="12" fill="#60a5fa" text-anchor="middle" font-weight="600">GDPR-ready</text>
  </g>

  <!-- Tech stack badges top-right -->
  <g transform="translate(900, 100)">
    <rect width="80" height="26" rx="5" fill="#1e3a5f" opacity="0.8"/>
    <text x="40" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">Node.js</text>
  </g>
  <g transform="translate(992, 100)">
    <rect width="80" height="26" rx="5" fill="#1e3a5f" opacity="0.8"/>
    <text x="40" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">React 19</text>
  </g>
  <g transform="translate(1084, 100)">
    <rect width="80" height="26" rx="5" fill="#1e3a5f" opacity="0.8"/>
    <text x="40" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">PostgreSQL</text>
  </g>
  <g transform="translate(900, 138)">
    <rect width="80" height="26" rx="5" fill="#1e3a5f" opacity="0.8"/>
    <text x="40" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">Docker</text>
  </g>
  <g transform="translate(992, 138)">
    <rect width="80" height="26" rx="5" fill="#1e3a5f" opacity="0.8"/>
    <text x="40" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">Vite 7</text>
  </g>
  <g transform="translate(1084, 138)">
    <rect width="80" height="26" rx="5" fill="#1e3a5f" opacity="0.8"/>
    <text x="40" y="17" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
          font-size="11" fill="#93c5fd" text-anchor="middle" font-weight="600">HIPAA</text>
  </g>

  <!-- Author -->
  <text x="192" y="358" font-family="'Inter', 'Segoe UI', Arial, sans-serif"
        font-size="13" fill="#475569" letter-spacing="0.3">
    Rayen Lassoued  ·  github.com/rayenx2  ·  linkedin.com/in/Rayen-Lassoued
  </text>
</svg>
